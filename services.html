<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKEA - 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="placeholder.css">
</head>
<body>
    <header class="container header-container">
        <a href="index.html" class="link ikea-logo">
            <div class="ikea-svg-container">
                <img src="images/ikeawhite.png" alt="IKEA 로고" class="ikea-svg">
            </div>
        </a>
        <div class="search-box">
             <button class="magnifier" aria-label="검색">
                <img src="images/Search.png" alt="검색">
            </button>
            <div class="combobox">
                <input type="search" placeholder="검색어 입력" class="search-input">
            </div>
        </div>
        <div class="mypage-section">
             <a href="login/login.html" class="login-button">
                <img src="images/User.png" alt="로그인" class="svg">
            </a>
            <a href="wishlist.html" class="link wishlist">
                <img src="images/Heart.png" alt="위시리스트">
            </a>
            <a href="cart.html" class="link cart">
                <img src="images/ShoppingBag.png" alt="장바구니">
            </a>
        </div>
    </header>
    <main class="container placeholder-main">
        <div class="placeholder-content">
        <h1>준비 중인 페이지입니다</h1>
        <p>요청하신 페이지는 현재 준비 중입니다.</p>
        <a href="index.html" class="button black-button back-button">메인으로 돌아가기</a>
            </div>
    </main>
    <footer class="footer">
        <div class="container footer-container">
            <div class="copyright-section">
                <p>© Inter IKEA Systems B.V 1999-2025</p>
            </div>
        </div>
    </footer>
</body>
</html>
